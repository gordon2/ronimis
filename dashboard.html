<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gym Occupancy Over Time</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    h1 { margin: 0 0 8px 0; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .sub { color: #555; }
    .refresh-btn { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: #0056b3; }
    .refresh-btn:disabled { background: #6c757d; cursor: not-allowed; }
    .date-input { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .status { margin-left: 8px; font-size: 14px; color: #28a745; }
    #wrap { width: 100%; }
    canvas { width: 100%; height: 520px; }

    .period { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 0 0 8px; font-size: 14px; }
    .period .lbl { color: #555; margin-right: 4px; }
    .month-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 0 0 14px; padding-left: 2px; }
    .month-row:empty { display: none; }
    .pbtn { background: #fff; color: #333; border: 1px solid #ccc; border-radius: 6px; padding: 5px 11px; font-size: 13px; cursor: pointer; font-variant-numeric: tabular-nums; }
    .pbtn:hover { border-color: #888; }
    .pbtn.active { background: #007bff; color: #fff; border-color: #007bff; }

    .insights { margin-top: 26px; }
    .insights h2 { font-size: 16px; margin: 0 0 12px; }
    .cards { display: flex; flex-wrap: wrap; gap: 12px; }
    .card { border: 1px solid #e4e4e4; border-radius: 10px; padding: 14px 16px; min-width: 220px; flex: 1 1 220px; }
    .card h3 { margin: 0 0 10px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .card .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .card .r { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; padding: 3px 0; }
    .card .r .k { color: #666; }
    .card .r .v { color: #111; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .card .none { color: #999; font-size: 13px; }

    .fresh { display: inline-block; margin-top: 6px; font-size: 12px; padding: 3px 10px; border-radius: 999px; font-weight: 600; cursor: default; }
    .fresh .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .fresh-live { background: #e7f7ed; color: #127a3e; }
    .fresh-live .dot { background: #16a34a; }
    .fresh-delayed { background: #fdf4e3; color: #8a5a00; }
    .fresh-delayed .dot { background: #e0a106; }
    .fresh-stale { background: #fdeaea; color: #a41c1c; }
    .fresh-stale .dot { background: #dc2626; }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="header">
      <div>
        <h1>Gym Occupancy Over Time</h1>
        <a href="busyness.html" style="font-size:14px;color:#007bff;text-decoration:none;">Typical busyness →</a>
        <div><span id="freshness" class="fresh"></span></div>
      </div>
      <div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
          <label for="fromDate">From:</label>
          <input type="date" id="fromDate" class="date-input">
          <label for="toDate">To:</label>
          <input type="date" id="toDate" class="date-input">
          <button id="refreshRangeBtn" class="refresh-btn" onclick="refreshDataRange()">Search</button>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <button id="refreshBtn" class="refresh-btn" onclick="showToday()">Today</button>
          <button id="downloadBtn" class="refresh-btn" onclick="downloadAllCSVs()">Download CSVs</button>
          <span id="status" class="status"></span>
        </div>
      </div>
    </div>

    <div class="period" id="yearRow"></div>
    <div class="month-row" id="monthRow"></div>

    <canvas id="chart"></canvas>

    <div class="insights">
      <h2 id="insightsTitle">Insights</h2>
      <div class="cards" id="cards"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script>
    // The UMD global for chartjs-plugin-annotation@3 is 'chartjs-plugin-annotation'
    const AnnotationPlugin = window['chartjs-plugin-annotation'] || window.ChartAnnotation;
    if (AnnotationPlugin) Chart.register(AnnotationPlugin);
  </script>
  <script>
    const ctx = document.getElementById('chart');
    const DAY_FULL = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday', Sat:'Saturday', Sun:'Sunday' };
    const GYM_COLORS = { 'Hipodroom':'#36A2EB', 'Mustika':'#FF6384', 'T1':'#FF9F40', 'Suur-Paala':'#4BC0C0' };
    const FALLBACK = ['#9966FF', '#FFCD56', '#C9CBCF', '#8DD17E'];
    function colorFor(name, i) { return GYM_COLORS[name] || FALLBACK[i % FALLBACK.length]; }

    let datasets = [];
    let chart;
    let meta = { months: [], dataStart: '', dataEnd: '' };
    let period = { mode: 'all' }; // all | year | month | today | custom
    let applySeq = 0; // guards against overlapping apply() calls racing each other

    // ---- chart ----
    // Typical spacing between consecutive points (= the bucket size). Used to set a
    // gap threshold relative to the data's resolution, so only real collector
    // outages break the line — not the normal step between buckets.
    function typicalSpacingMs(data) {
      let best = null;
      data.forEach(ds => { if (!best || ds.data.length > best.data.length) best = ds; });
      if (!best || best.data.length < 2) return null;
      const deltas = [];
      for (let i = 1; i < best.data.length; i++) {
        const d = new Date(best.data[i].x).getTime() - new Date(best.data[i - 1].x).getTime();
        if (d > 0) deltas.push(d);
      }
      if (!deltas.length) return null;
      deltas.sort((a, b) => a - b);
      return deltas[Math.floor(deltas.length / 2)]; // median
    }

    // Chart.js auto-picks the axis unit from range + canvas width, and on a wide
    // canvas a short (~1-2 week) range gets 'hour' ticks. Pick the unit ourselves.
    function pickTimeUnit() {
      let min = Infinity, max = -Infinity;
      datasets.forEach(ds => ds.data.forEach(p => {
        const t = new Date(p.x).getTime();
        if (t < min) min = t;
        if (t > max) max = t;
      }));
      if (!isFinite(min) || !isFinite(max)) return 'day';
      const days = (max - min) / 86400000;
      if (days <= 2.5) return 'hour';
      if (days <= 120) return 'day';
      return 'month';
    }

    // Build the chart from datasets returned directly by the generate endpoint
    // (no shared gym-data.json fetch — that was racy across overlapping requests).
    function renderDatasets(data) {
      data = data || [];
      let total = 0;
      data.forEach(ds => total += ds.data.length);
      const showPoints = total <= 1500;
      const med = typicalSpacingMs(data);
      const spanGapsMs = med ? med * 3 : 3 * 60 * 60 * 1000;
      datasets = data.map((ds, i) => ({
        ...ds,
        data: ds.data.map(point => ({ ...point, x: point.x.replace(/[+-]\d{2}:\d{2}$/, '') })),
        parsing: { xAxisKey: 'x', yAxisKey: 'y' },
        spanGaps: spanGapsMs, // break the line only across real gaps (> 3x the bucket step)
        pointRadius: showPoints ? 2 : 0,
        borderWidth: 2,
        borderColor: colorFor(ds.label, i),
        backgroundColor: colorFor(ds.label, i),
        pointBackgroundColor: colorFor(ds.label, i)
      }));
      updateChart();
    }

    function getDaySeparators() {
      const uniqueDays = new Set();
      datasets.forEach(dataset => dataset.data.forEach(point => {
        const d = new Date(point.x);
        uniqueDays.add(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'));
      }));
      // Skip per-day lines on wide ranges — they turn into unreadable clutter
      if (uniqueDays.size > 40) return {};
      const separators = {};
      Array.from(uniqueDays).sort().forEach((dayKey, index) => {
        separators[`day${index}`] = {
          type: 'line', xMin: dayKey + ' 00:00', xMax: dayKey + ' 00:00',
          borderColor: 'rgba(0,0,0,0.35)', borderWidth: 1, borderDash: [5, 5]
        };
      });
      return separators;
    }

    function updateChart() {
      const unit = pickTimeUnit();
      if (chart) {
        chart.data.datasets = datasets;
        chart.options.scales.x.time.unit = unit;
        chart.options.plugins.annotation.annotations = getDaySeparators();
        chart.update();
        return;
      }
      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          normalized: true,
          interaction: { mode: 'nearest', intersect: false },
          animation: false,
          scales: {
            x: {
              type: 'time',
              time: {
                unit: unit,
                tooltipFormat: 'yyyy-MM-dd HH:mm',
                displayFormats: { hour: 'HH:mm', day: 'MMM dd', week: 'MMM dd', month: 'MMM yyyy' }
              },
              ticks: { autoSkip: true, maxRotation: 0 }
            },
            y: { beginAtZero: true, title: { display: true, text: 'People' } }
          },
          plugins: {
            annotation: { annotations: getDaySeparators() },
            legend: { position: 'bottom' },
            tooltip: {
              callbacks: {
                title: (items) => new Date(items[0].raw.x).toLocaleString('en-US', {
                  weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
                  hour: '2-digit', minute: '2-digit', hour12: false
                }),
                label: (item) => item.dataset.label + ': ' + item.raw.y
              }
            }
          },
          elements: { line: { tension: 0.2 } }
        }
      });
    }

    // ---- period switcher ----
    function lastDay(y, m) { return new Date(y, m, 0).getDate(); }
    function pad(n) { return String(n).padStart(2, '0'); }
    function monthShort(ym) { return new Date(2000, Number(ym.split('-')[1]) - 1, 1).toLocaleString('en-US', { month: 'short' }); }
    function monthLong(ym) { const [y, m] = ym.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' }); }

    function periodRange() {
      if (period.mode === 'all') return { from: meta.dataStart, to: meta.dataEnd };
      if (period.mode === 'year') return { from: period.year + '-01-01', to: period.year + '-12-31' };
      if (period.mode === 'month') { const [y, m] = period.month.split('-').map(Number); return { from: period.month + '-01', to: period.month + '-' + pad(lastDay(y, m)) }; }
      if (period.mode === 'today') { const t = new Date(); const d = t.getFullYear() + '-' + pad(t.getMonth() + 1) + '-' + pad(t.getDate()); return { from: d, to: d }; }
      return { from: document.getElementById('fromDate').value, to: document.getElementById('toDate').value };
    }
    function periodLabel() {
      if (period.mode === 'all') return 'all data';
      if (period.mode === 'year') return period.year;
      if (period.mode === 'month') return monthLong(period.month);
      if (period.mode === 'today') return 'today';
      const r = periodRange(); return r.from + ' → ' + r.to;
    }

    function mkBtn(label, active, onclick) {
      const b = document.createElement('button');
      b.className = 'pbtn' + (active ? ' active' : '');
      b.textContent = label;
      b.onclick = onclick;
      return b;
    }
    function renderPeriod() {
      const years = [...new Set(meta.months.map(m => m.slice(0, 4)))].sort();
      const yr = document.getElementById('yearRow');
      yr.innerHTML = '';
      const lbl = document.createElement('span'); lbl.className = 'lbl'; lbl.textContent = 'Period'; yr.appendChild(lbl);
      yr.appendChild(mkBtn('All data', period.mode === 'all', () => { period = { mode: 'all' }; apply(); }));
      years.forEach(y => yr.appendChild(mkBtn(y, period.mode !== 'all' && period.year === y, () => { period = { mode: 'year', year: y }; apply(); })));

      const mr = document.getElementById('monthRow');
      mr.innerHTML = '';
      if (period.year) {
        meta.months.filter(m => m.slice(0, 4) === period.year).forEach(m => {
          mr.appendChild(mkBtn(monthShort(m), period.mode === 'month' && period.month === m, () => { period = { mode: 'month', year: period.year, month: m }; apply(); }));
        });
      }
    }

    // ---- insights ----
    async function renderInsights(range, seq) {
      const cards = document.getElementById('cards');
      document.getElementById('insightsTitle').textContent = 'Insights · ' + periodLabel();
      try {
        const res = await fetch('busyness-data?from=' + range.from + '&to=' + range.to);
        const d = await res.json();
        if (seq !== undefined && seq !== applySeq) return; // superseded by a newer selection
        const days = d.days;
        if (!d.locations || !d.locations.length) { cards.innerHTML = '<p class="none">No data for this period.</p>'; return; }
        cards.innerHTML = '';
        d.locations.forEach((loc, i) => cards.appendChild(insightCard(loc, days, i)));
      } catch (e) {
        if (seq === undefined || seq === applySeq) cards.innerHTML = '<p class="none">Could not load insights.</p>';
      }
    }

    function insightCard(loc, days, idx) {
      // daily total over open hours; weekly hourly average
      let dayTotal = days.map((_, dd) => { let s = 0, has = false; for (let h = 0; h < 24; h++) if (loc.samples[dd][h] > 0) { s += loc.avg[dd][h]; has = true; } return has ? s : null; });
      let bD = null, qD = null;
      days.forEach((_, dd) => { if (dayTotal[dd] == null) return; if (bD == null || dayTotal[dd] > dayTotal[bD]) bD = dd; if (qD == null || dayTotal[dd] < dayTotal[qD]) qD = dd; });

      let hourAvg = [];
      for (let h = 0; h < 24; h++) { let s = 0, c = 0; for (let dd = 0; dd < 7; dd++) if (loc.samples[dd][h] > 0) { s += loc.avg[dd][h]; c++; } hourAvg[h] = c ? s / c : null; }
      let bH = null, best = null;
      hourAvg.forEach((v, h) => { if (v == null) return; if (bH == null || v > hourAvg[bH]) bH = h; if (v > 0 && (best == null || v < hourAvg[best])) best = h; });

      let peak = { v: -1, d: 0, h: 0 };
      for (let dd = 0; dd < 7; dd++) for (let h = 0; h < 24; h++) if (loc.avg[dd][h] > peak.v) peak = { v: loc.avg[dd][h], d: dd, h };

      const card = document.createElement('div'); card.className = 'card';
      const hh = h => pad(h) + ':00';
      const rows = [];
      if (bD != null) rows.push(['Busiest day', DAY_FULL[days[bD]]]);
      if (qD != null) rows.push(['Quietest day', DAY_FULL[days[qD]]]);
      if (bH != null) rows.push(['Busiest time', hh(bH)]);
      if (best != null) rows.push(['Quietest open time', hh(best)]);
      if (peak.v >= 0) rows.push(['Typical peak', Math.round(peak.v) + ' · ' + days[peak.d] + ' ' + hh(peak.h)]);

      card.innerHTML = '<h3><span class="dot" style="background:' + colorFor(loc.name, idx) + '"></span>' + loc.name + '</h3>' +
        (rows.length ? rows.map(r => '<div class="r"><span class="k">' + r[0] + '</span><span class="v">' + r[1] + '</span></div>').join('')
                     : '<div class="none">Not enough data.</div>');
      return card;
    }

    // ---- apply / actions ----
    async function apply(urlMode) {
      const seq = ++applySeq;
      const status = document.getElementById('status');
      renderPeriod();
      writeURL(urlMode || 'push');
      const range = periodRange();
      if (!range.from || !range.to) { status.textContent = '✗ Pick both dates'; setTimeout(() => status.textContent = '', 3000); return; }
      status.textContent = 'Loading…';
      try {
        const gen = await fetch('/generate-data-range', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(range) });
        if (seq !== applySeq) return; // a newer selection superseded this one
        const r = await gen.json();
        if (seq !== applySeq) return;
        if (!gen.ok || !r.success) throw new Error(r.error || 'failed');
        renderDatasets(r.datasets);
        await renderInsights(range, seq);
        if (seq === applySeq) status.textContent = '';
      } catch (e) {
        if (seq !== applySeq) return;
        // No data in range is a normal outcome (e.g. a month with a gap)
        renderDatasets([]);
        await renderInsights(range, seq);
        if (seq === applySeq) status.textContent = '';
      }
    }

    function refreshDataRange() { period = { mode: 'custom' }; apply(); }
    function showToday() { period = { mode: 'today' }; apply(); }

    function downloadAllCSVs() {
      const link = document.createElement('a');
      link.href = '/download-csvs'; link.download = 'gym-stats-data.zip';
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    // ---- shareable URL (?month=YYYY-MM | ?year=YYYY | ?from=&to= | ?period=all|today) ----
    function buildQuery() {
      const p = new URLSearchParams();
      if (period.mode === 'all') p.set('period', 'all');
      else if (period.mode === 'today') p.set('period', 'today');
      else if (period.mode === 'year') p.set('year', period.year);
      else if (period.mode === 'month') p.set('month', period.month);
      else if (period.mode === 'custom') { const r = periodRange(); if (r.from) p.set('from', r.from); if (r.to) p.set('to', r.to); }
      return p.toString();
    }

    // 'push' adds a history entry (user selections → Back/Forward walks them);
    // 'replace' rewrites the current entry (initial load, no phantom entry);
    // 'none' leaves history untouched (rendering in response to popstate).
    function writeURL(mode) {
      if (mode === 'none') return;
      const qs = buildQuery();
      if (mode === 'push' && ('?' + qs) === location.search) return; // skip duplicate entry
      const url = qs ? ('?' + qs) : location.pathname;
      if (mode === 'push') history.pushState(null, '', url);
      else history.replaceState(null, '', url);
    }

    function readURL() {
      const p = new URLSearchParams(location.search);
      const month = p.get('month');
      if (month && /^\d{4}-\d{2}$/.test(month)) return { mode: 'month', year: month.slice(0, 4), month };
      const year = p.get('year');
      if (year && /^\d{4}$/.test(year)) return { mode: 'year', year };
      const from = p.get('from'), to = p.get('to');
      if (from && to) { document.getElementById('fromDate').value = from; document.getElementById('toDate').value = to; return { mode: 'custom' }; }
      const per = p.get('period');
      if (per === 'all') return { mode: 'all' };
      if (per === 'today') return { mode: 'today' };
      return null;
    }

    // ---- init ----
    function defaultPeriod() {
      if (meta.months.length) {
        const latest = meta.months[meta.months.length - 1];
        return { mode: 'month', year: latest.slice(0, 4), month: latest };
      }
      return { mode: 'all' };
    }

    // Back/Forward: the browser has already changed the URL — re-read it and
    // re-render, without writing a new history entry.
    window.addEventListener('popstate', () => {
      period = readURL() || defaultPeriod();
      apply('none');
    });

    // ---- data freshness badge ----
    function formatAge(s) {
      if (s < 60) return s + 's';
      if (s < 3600) return Math.floor(s / 60) + 'm';
      if (s < 86400) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h + 'h' + (m ? ' ' + m + 'm' : ''); }
      const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600); return d + 'd' + (h ? ' ' + h + 'h' : '');
    }
    async function pollStatus() {
      const el = document.getElementById('freshness');
      try {
        const s = await (await fetch('status', { cache: 'no-store' })).json();
        if (!s.latest || s.ageSeconds == null || s.ageSeconds < 0) {
          el.className = 'fresh fresh-stale'; el.innerHTML = '<span class="dot"></span>No data collected'; el.title = ''; return;
        }
        const age = s.ageSeconds;
        let cls, label;
        if (age < 300) { cls = 'fresh-live'; label = 'Live · updated ' + formatAge(age) + ' ago'; }
        else if (age < 1800) { cls = 'fresh-delayed'; label = 'Delayed · ' + formatAge(age) + ' ago'; }
        else { cls = 'fresh-stale'; label = 'Collection stalled · ' + formatAge(age) + ' ago'; }
        el.className = 'fresh ' + cls;
        el.innerHTML = '<span class="dot"></span>' + label;
        el.title = (s.locations || []).map(l => l.name + ': ' + l.count).join('   ·   ');
      } catch (e) {
        el.className = 'fresh fresh-stale'; el.innerHTML = '<span class="dot"></span>status unavailable';
      }
    }

    async function init() {
      try {
        const res = await fetch('busyness-data');
        const d = await res.json();
        meta = { months: d.months || [], dataStart: d.dataStart || '', dataEnd: d.dataEnd || '' };
      } catch (e) { /* fall back to all */ }
      period = readURL() || defaultPeriod();
      apply('replace'); // normalize the initial entry; don't add a phantom one
    }
    init();
    pollStatus();
    setInterval(pollStatus, 60000);
  </script>
</body>
</html>
